<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA 26 Live Knockouts Revolve</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wallpaper-container">
        <div class="center-glow"></div>

        <canvas id="bracketCanvas"></canvas>

        <div id="nodesOverlay" class="nodes-overlay"></div>

        <div id="centerTrophy" class="trophy-slot">
            <img src="assets/fifa-trophy.png" alt="FIFA World Cup Trophy">
        </div>
        
        <div id="statsPanel" class="stats-panel">
            <button id="closePanelBtn" class="close-panel-btn">&times;</button>
            
            <div class="panel-toggle-tabs">
                <button id="tabMatchStats" class="toggle-tab active">Match Stats</button>
                <button id="tabLeaders" class="toggle-tab">Top Stats</button>
            </div>

            <div id="statsContent" class="stats-content"></div>
            <div id="leadersContent" class="leaders-content hidden"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
